<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tes MBTI &mdash; BK SMP Al Hikmah Surabaya</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f0f0ec}
.wrap{max-width:800px;margin:0 auto;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.hdr{background:#0D4A3A;padding:12px 16px;display:flex;align-items:center;gap:14px}
.hdr img{height:60px;width:auto}
.ht .t1{font-size:14px;font-weight:500;color:#B8952A;line-height:1.3}
.ht .t2{font-size:11px;color:rgba(184,149,42,.75);margin-top:2px}
.nav{display:flex;background:#f8f7f4;border-bottom:1px solid #ddd;padding:0 .8rem;overflow-x:auto}
.nb{padding:10px 12px;font-size:12px;border:none;background:none;cursor:pointer;color:#666;border-bottom:2px solid transparent;white-space:nowrap}
.nb.a{color:#0D4A3A;border-bottom-color:#B8952A;font-weight:600}
.nb:hover:not(.a){color:#333}
.con{padding:1.25rem;min-height:400px}
.pg{display:none}.pg.a{display:block}
.lb{font-size:13px;color:#666;margin-bottom:4px;display:block}
.ip{width:100%;padding:8px 11px;border:1px solid #ccc;border-radius:6px;font-size:13.5px}
.fr{margin-bottom:.9rem}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:9px 20px;background:#0D4A3A;color:#fff;border:none;border-radius:6px;font-size:13.5px;cursor:pointer;font-weight:500}
.btn:hover{background:#0a3a2e}
.bt2{padding:7px 14px;border:1px solid #ccc;border-radius:6px;font-size:12.5px;cursor:pointer;background:#fff}
.pbw{background:#eee;border-radius:99px;height:7px;margin-bottom:1.1rem}
.pb{height:7px;border-radius:99px;background:#B8952A;transition:width .3s}
.pi{display:flex;justify-content:space-between;font-size:11.5px;color:#999;margin-bottom:4px}
.qc{background:#f5f5f1;border-radius:9px;padding:1.1rem;margin-bottom:.9rem}
.qn{font-size:11px;color:#0D4A3A;font-weight:600;margin-bottom:4px}
.qt{font-size:14.5px;color:#222;margin-bottom:.9rem;line-height:1.5}
.op{display:flex;align-items:flex-start;gap:9px;width:100%;padding:9px 13px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;text-align:left;margin-bottom:7px;font-size:13.5px;color:#222;line-height:1.4}
.op:hover{border-color:#0D4A3A;background:#E1F5EE}
.op.sl{border-color:#B8952A;background:#FAEEDA;color:#412402}
.ol{font-weight:700;min-width:14px;color:#0D4A3A}
.op.sl .ol{color:#B8952A}
.nb2{display:flex;gap:9px;margin-top:.9rem}
.rh{text-align:center;padding:1.5rem;background:linear-gradient(135deg,#E1F5EE,#FAEEDA);border-radius:9px;margin-bottom:1.3rem}
.rb{font-size:44px;font-weight:700;color:#0D4A3A;letter-spacing:4px}
.rn{font-size:16px;color:#B8952A;margin-top:4px;font-weight:500}
.rs{font-size:12px;color:#888;margin-top:3px}
.narasi-box{background:linear-gradient(135deg,#f0f9f5,#fdf6e8);border-left:4px solid #0D4A3A;border-radius:0 8px 8px 0;padding:1rem 1.2rem;margin-bottom:1.3rem;font-size:13.5px;color:#333;line-height:1.8}
.narasi-box .narasi-title{font-size:12px;font-weight:600;color:#0D4A3A;text-transform:uppercase;letter-spacing:1px;margin-bottom:.6rem}
.dr{margin-bottom:11px}
.dl2{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.dL{color:#0D4A3A;font-weight:600}
.dR{color:#999}
.dt{background:#eee;border-radius:99px;height:11px}
.df{height:11px;border-radius:99px;transition:width .5s}
.st{font-size:13.5px;font-weight:600;color:#333;margin-bottom:8px}
.dl{list-style:none;padding:0}
.dl li{padding:5px 0;border-bottom:1px solid #eee;font-size:13px;color:#333;display:flex;gap:7px;align-items:flex-start;line-height:1.5}
.dl li:last-child{border:none}
.db{font-size:12px;min-width:10px;color:#0D4A3A}
.tgs{display:flex;flex-wrap:wrap;gap:6px}
.tg{padding:3px 12px;border-radius:99px;font-size:12px;background:#E1F5EE;color:#085041}
.emp{text-align:center;padding:2.5rem;color:#bbb}
.ib{background:#f5f5f1;border-radius:6px;padding:.9rem;font-size:13px;color:#888;line-height:1.6;margin-bottom:.9rem}
@media print{.nav,.nb2,.hdr,.btn,.bt2{display:none!important}.pg{display:block!important}}
.status-ok{background:#e6f4ea;border:1px solid #34a853;color:#1e7e34;padding:10px 14px;border-radius:6px;font-size:13px}
.status-err{background:#fce8e6;border:1px solid #ea4335;color:#c5221f;padding:10px 14px;border-radius:6px;font-size:13px}
.status-load{background:#e8f0fe;border:1px solid #1a73e8;color:#1558b0;padding:10px 14px;border-radius:6px;font-size:13px}
</style>
</head>

ISTP:"Ananda adalah pribadi yang tenang, logis, dan sangat jago dalam memecahkan masalah secara praktis. Kamu tidak banyak bicara, namun ketika berbicara selalu ada isinya. Ananda sangat percaya diri, mandiri, dan tidak mudah panik saat menghadapi situasi yang mendadak berubah. Kamu lebih suka belajar dari pengalaman langsung daripada sekadar membaca teori. Ananda biasanya memiliki kemampuan teknis yang baik dan senang memahami bagaimana sesuatu bekerja. Ke depannya, Ananda perlu belajar lebih terbuka dalam berbagi perasaan dan pikiran dengan orang-orang terdekatmu, serta lebih aktif dalam kehidupan sosial agar tidak terkesan cuek atau sulit didekati.",
ISFP:"Ananda adalah pribadi yang lembut, hangat, dan sangat peka terhadap keindahan dan perasaan. Kamu tidak suka konflik dan cenderung menghindari perdebatan, serta tidak pernah memaksakan pendapatmu kepada orang lain. Ananda menunjukkan rasa peduli melalui tindakan nyata, bukan sekadar kata-kata. Kamu hidup di momen saat ini dan sangat menikmati hal-hal sederhana di sekitarmu. Ananda memiliki jiwa seni yang kuat dan kreativitas yang perlu terus dikembangkan. Ke depannya, Ananda perlu belajar lebih berani menghadapi konflik secara sehat, lebih tegas dalam menyampaikan pendapat, dan mulai memikirkan rencana jangka panjang untuk masa depanmu.",
INFJ:"Ananda adalah pribadi yang visioner, penuh empati, dan selalu berusaha memberikan dampak positif bagi orang-orang di sekitarmu. Kamu memiliki intuisi yang kuat dan sering bisa merasakan apa yang orang lain rasakan meski tidak diucapkan. Ananda adalah tipe orang yang memegang teguh nilai-nilai dan prinsip hidupnya, dan tidak mudah terpengaruh oleh tekanan orang lain. Kamu penuh ide kreatif dan memiliki visi yang jelas tentang apa yang ingin kamu capai. Ananda perlu belajar untuk lebih rileks, tidak terlalu perfeksionis, dan mau berbagi beban dengan orang-orang yang kamu percaya agar tidak kelelahan sendirian.",
INTJ:"Ananda adalah pribadi yang cerdas, strategis, dan selalu berpikir jauh ke depan. Kamu memiliki kemampuan analisa yang tajam dan selalu bisa melihat gambaran besar dari suatu permasalahan. Ananda sangat mandiri dan percaya diri dengan kemampuan diri sendiri. Kamu memiliki standar yang tinggi dan tidak mudah puas dengan hasil yang biasa-biasa saja. Meski terkadang terlihat dingin atau terlalu serius, sebenarnya Ananda sangat peduli dengan kualitas dari apa yang kamu kerjakan. Ke depannya, Ananda perlu belajar lebih terbuka untuk menerima pendapat orang lain, mengungkapkan perasaan secara lebih hangat, dan lebih sabar dalam bekerja sama dengan teman-teman.",
INFP:"Ananda adalah pribadi yang kreatif, idealis, dan memiliki kepedulian yang sangat dalam terhadap orang-orang yang kamu sayangi. Kamu sangat peka terhadap perasaan orang lain dan selalu berusaha bersikap adil serta menjunjung nilai-nilai kebaikan. Ananda memiliki dunia batin yang kaya dan imajinasi yang luar biasa. Kamu cenderung memikirkan solusi yang terbaik untuk semua pihak. Ananda perlu belajar lebih berani menghadapi kritik, lebih tegas dalam mengambil keputusan, dan tidak terlalu keras menghakimi diri sendiri ketika membuat kesalahan. Ingat, Ananda juga berhak bahagia dan diprioritaskan.",
INTP:"Ananda adalah pribadi yang sangat analitis, intelektual, dan senang memecahkan teka-teki atau masalah yang kompleks. Kamu tidak puas dengan jawaban yang dangkal dan selalu ingin memahami sesuatu sampai ke akar-akarnya. Ananda memiliki kemampuan berpikir yang tajam dan orisinal, serta sangat menghargai pengetahuan dan ilmu. Kamu cenderung pendiam dan lebih nyaman bekerja sendiri, namun pikiranmu selalu aktif dan penuh ide. Ke depannya, Ananda perlu belajar lebih memperhatikan perasaan orang lain, membangun hubungan sosial yang lebih hangat, dan mulai menerapkan ide-idemu yang luar biasa ke dalam tindakan nyata.",
ESTP:"Ananda adalah pribadi yang energik, berani, dan sangat tanggap terhadap situasi di sekitarnya. Kamu tidak suka berlama-lama dalam teori dan lebih memilih langsung terjun dan mencoba sendiri. Ananda sangat jago dalam menghadapi situasi yang cepat berubah dan selalu tahu cara membuat suasana menjadi hidup dan menyenangkan. Kamu pandai berkomunikasi dan mudah berinteraksi dengan siapa saja. Ke depannya, Ananda perlu belajar lebih sabar dalam mengambil keputusan penting, lebih konsisten dalam menjalankan rencana jangka panjang, dan sesekali meluangkan waktu untuk merenung agar tindakanmu lebih terarah.",
ESFP:"Ananda adalah pribadi yang ceria, hangat, dan selalu bisa membuat orang-orang di sekitarmu merasa nyaman dan bahagia. Kamu sangat mudah berteman, terbuka, dan penuh semangat dalam menikmati setiap momen kehidupan. Ananda memiliki kemampuan sosial yang luar biasa dan selalu tahu cara menghibur orang yang sedang sedih. Kamu hidup di saat ini dan sangat menikmati pengalaman nyata bersama orang-orang yang kamu sayangi. Ke depannya, Ananda perlu belajar lebih disiplin dalam belajar dan mengerjakan tugas, lebih berani menghadapi situasi yang tidak menyenangkan, dan mulai memikirkan rencana masa depan secara lebih serius.",
ENFP:"Ananda adalah pribadi yang penuh semangat, kreatif, dan sangat menginspirasi orang-orang di sekitarmu. Kamu memiliki antusias yang besar terhadap ide-ide baru dan selalu bisa melihat potensi terbaik dari setiap orang. Ananda sangat mudah bergaul, hangat, dan mampu membuat orang lain merasa dihargai dan didengar. Kamu penuh imajinasi dan selalu bisa menemukan cara yang menarik dalam menghadapi berbagai situasi. Ke depannya, Ananda perlu belajar lebih fokus dan konsisten dalam menyelesaikan sesuatu sampai tuntas, tidak terlalu mudah teralihkan oleh ide-ide baru, dan lebih memperhatikan kebutuhan dirimu sendiri.",
ENTP:"Ananda adalah pribadi yang cerdas, inovatif, dan selalu penuh dengan ide-ide segar yang mengejutkan. Kamu sangat senang berdiskusi, berdebat, dan menantang cara berpikir yang biasa. Ananda memiliki kemampuan berpikir yang cepat dan selalu bisa melihat berbagai sudut pandang dari suatu permasalahan. Kamu sangat fleksibel dan tidak takut mencoba hal-hal baru yang belum pernah ada sebelumnya. Ke depannya, Ananda perlu belajar lebih disiplin dan konsisten dalam menyelesaikan apa yang sudah dimulai, lebih menghargai perasaan orang lain saat berdiskusi, dan tidak mudah bosan terhadap hal-hal yang sudah dimulai.",

let ci=0,jw={},sis={};

function gp(p){
  document.querySelectorAll('.pg').forEach(x=>x.classList.remove('a'));
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('a'));
  document.getElementById('p-'+p).classList.add('a');
  document.getElementById('nb'+p).classList.add('a');

}

function mul(){
  const nm=document.getElementById('fn').value.trim();
  const kls=document.getElementById('fk').value.trim();
  const jk=document.getElementById('fj').value;
  if(!nm||!kls||!jk){alert('Lengkapi semua data terlebih dahulu!');return;}
  sis={nm,kls,jk,tgl:document.getElementById('ft').value||new Date().toLocaleDateString('id-ID')};
  jw={};ci=0;rSoal();gp('s');
}

function rSoal(){
  const s=S[ci],tot=S.length,pct=Math.round((ci/tot)*100);
  document.getElementById('sct').textContent='Soal '+(ci+1)+' dari '+tot;
  document.getElementById('spc').textContent=pct+'% selesai';
  document.getElementById('pbar').style.width=pct+'%';
  const j=jw[ci];
  document.getElementById('sqc').innerHTML=
    '<div class="qc"><div class="qn">Soal '+(ci+1)+' / '+tot+' &mdash; Dimensi '+s.d+'</div>'+
    '<div class="qt">'+s.p+'</div>'+
    '<button class="op'+(j==='A'?' sl':'')+'" onclick="pilih(&quot;A&quot;)" id="oA"><span class="ol">A</span><span>'+s.a+'</span></button>'+
    '<button class="op'+(j==='B'?' sl':'')+'" onclick="pilih(&quot;B&quot;)" id="oB"><span class="ol">B</span><span>'+s.b+'</span></button>'+
    '</div>';
  document.getElementById('bpv').style.display=ci===0?'none':'';
  document.getElementById('bnx').textContent=ci===tot-1?'Lihat Hasil':'Berikutnya ▸';
  document.getElementById('sst').textContent=Object.keys(jw).length+' dari '+tot+' soal sudah dijawab';
}

function pilih(v){
  jw[ci]=v;
  document.getElementById('oA').classList.toggle('sl',v==='A');
  document.getElementById('oB').classList.toggle('sl',v==='B');
  document.getElementById('sst').textContent=Object.keys(jw).length+' dari '+S.length+' soal sudah dijawab';
}

function nxt(){
  if(!jw[ci]){alert('Pilih jawaban terlebih dahulu!');return;}
  if(ci<S.length-1){ci++;rSoal();}else{hitung();}
}
function prv(){if(ci>0){ci--;rSoal();}}

function hitung(){
  const sk={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0},op={E:'I',I:'E',S:'N',N:'S',T:'F',F:'T',J:'P',P:'J'};
  S.forEach((s,i)=>{const j=jw[i];if(!j)return;sk[j==='A'?s.v:op[s.v]]=(sk[j==='A'?s.v:op[s.v]]||0)+1;});
  const t=(sk.E>=sk.I?'E':'I')+(sk.S>=sk.N?'S':'N')+(sk.T>=sk.F?'T':'F')+(sk.J>=sk.P?'J':'P');
  const pE=Math.round((sk.E/(sk.E+sk.I))*100),pS=Math.round((sk.S/(sk.S+sk.N))*100);
  const pT=Math.round((sk.T/(sk.T+sk.F))*100),pJ=Math.round((sk.J/(sk.J+sk.P))*100);
  const h={t,sk,pE,pS,pT,pJ,sis:{...sis}};_lastResult=h;showH(h);gp('h');
}

function showH(h){
  const m=M[h.t];if(!m)return;
  // Reset tombol kirim
  setTimeout(()=>{
    const b=document.getElementById('btnKirim');
    const s=document.getElementById('statusKirim');
    if(b){b.disabled=false;b.textContent='Kirim';b.style.background='#1a73e8';}
    if(s){s.style.display='none';s.innerHTML='';}
  },100);
  const narasi=NARASI[h.t]||'';
  document.getElementById('he').style.display='none';
  const ds=m.d.map(x=>'<li><span class="db">&#9679;</span>'+x+'</li>').join('');
  const sr=m.s.map(x=>'<li><span class="db" style="color:#B8952A">&#9679;</span>'+x+'</li>').join('');
  const pr=m.p.map(x=>'<span class="tg">'+x+'</span>').join('');
  const db=(pct,ki,ka,w)=>'<div class="dr"><div class="dl2"><span class="dL">'+ki+' ('+pct+'%)</span><span class="dR">'+(100-pct)+'% '+ka+'</span></div><div class="dt"><div class="df" style="width:'+pct+'%;background:'+w+'"></div></div></div>';
  document.getElementById('hc').style.display='';
  document.getElementById('hc').innerHTML=
    '<div class="rh"><div class="rb">'+h.t+'</div>'+
    '<div class="rn">'+m.n+' &mdash; &ldquo;'+m.t+'&rdquo;</div>'+
    '<div class="rs">'+h.sis.nm+' &nbsp;|&nbsp; Kelas '+h.sis.kls+' &nbsp;|&nbsp; '+h.sis.jk+' &nbsp;|&nbsp; '+h.sis.tgl+'</div></div>'+
    '<div class="narasi-box"><div class="narasi-title">&#128172; Gambaran Kepribadian Ananda</div>'+narasi+'</div>'+
    '<div style="margin-bottom:1.3rem"><div class="st">&#128202; Profil Dimensi Kepribadian</div>'+
    db(h.pE,'Ekstrovert','Introvert','#0D4A3A')+
    db(h.pS,'Sensing','Intuition','#B8952A')+
    db(h.pT,'Thinking','Feeling','#185FA5')+
    db(h.pJ,'Judging','Perceiving','#993556')+'</div>'+
    '<div style="margin-bottom:1.3rem"><div class="st">&#128100; Ciri-ciri Kepribadian</div><ul class="dl">'+ds+'</ul></div>'+
    '<div style="margin-bottom:1.3rem"><div class="st">&#128161; Saran Pengembangan Diri</div><ul class="dl">'+sr+'</ul></div>'+
    '<div style="margin-bottom:1.3rem"><div class="st">&#128188; Rekomendasi Profesi / Karir</div><div class="tgs">'+pr+'</div></div>'+
    '<div style="display:flex;gap:10px;margin-top:1.5rem;flex-wrap:wrap">'+
    '<button class="btn" onclick="window.print()">&#128424; Cetak Hasil</button>'+
    '<button class="btn" id="btnKirim" onclick="kirimGS()" style="background:#1a73e8">Kirim</button>'+
    '<button class="bt2" onclick="gp(&quot;i&quot;)">&#43; Tes Siswa Baru</button></div>'+
    '<div id="statusKirim" style="margin-top:10px;font-size:13px;display:none"></div>';
}



const GAS_URL = 'https://script.google.com/macros/s/AKfycbwEdJa5_vwjEVPES5DjvQmNEUO763xEj0QxjyCTmpDUkE84yebXnr8707rP-UDfp4a2LA/exec';

let _lastResult = null;

function kirimGS() {
  if (!_lastResult) {
    alert('Tidak ada data hasil tes. Kerjakan tes terlebih dahulu!');
    return;
  }
  if (GAS_URL === 'PASTE_WEB_APP_URL_DISINI' || GAS_URL === '') {
    alert('URL Google Apps Script belum diisi!');
    return;
  }
  const btn = document.getElementById('btnKirim');
  const status = document.getElementById('statusKirim');
  btn.disabled = true;
  btn.textContent = 'Mengirim...';
  status.style.display = 'block';
  status.className = 'status-load';
  status.innerHTML = '&#9203; Mengirim data ke Google Sheets...';

  const m = M[_lastResult.t];
  const params = new URLSearchParams({
    timestamp: new Date().toLocaleString('id-ID'),
    nama:      _lastResult.sis.nm,
    kelas:     _lastResult.sis.kls,
    jk:        _lastResult.sis.jk,
    tgl:       _lastResult.sis.tgl,
    tipe:      _lastResult.t,
    kepribadian: m ? m.n : '',
    tagline:   m ? m.t : '',
    pctE: _lastResult.pE, pctI: 100 - _lastResult.pE,
    pctS: _lastResult.pS, pctN: 100 - _lastResult.pS,
    pctT: _lastResult.pT, pctF: 100 - _lastResult.pT,
    pctJ: _lastResult.pJ, pctP: 100 - _lastResult.pJ
  });

  const cbName = 'gasCallback_' + Date.now();
  const script = document.createElement('script');

  const timer = setTimeout(function() {
    if (window[cbName]) {
      delete window[cbName];
      script.remove();
      btn.disabled = false;
      btn.textContent = 'Kirim';
      btn.style.background = '#1a73e8';
      status.className = 'status-err';
      status.innerHTML = '&#10007; Timeout. Cek koneksi internet dan URL GAS.';
    }
  }, 15000);

  window[cbName] = function(response) {
    clearTimeout(timer);
    delete window[cbName];
    script.remove();
    if (response && response.status === 'OK') {
      btn.disabled = false;
      btn.textContent = 'Kirim (terkoneksi GS)';
      btn.style.background = '#34a853';
      status.className = 'status-ok';
      status.innerHTML = '&#10003; Data <strong>' + _lastResult.sis.nm + '</strong> berhasil dikirim ke Google Sheets!';
    } else {
      btn.disabled = false;
      btn.textContent = 'Kirim';
      btn.style.background = '#1a73e8';
      status.className = 'status-err';
      status.innerHTML = '&#10007; Gagal: ' + (response ? response.message : 'Respons tidak dikenal');
    }
  };

  script.src = GAS_URL + '?' + params.toString() + '&callback=' + cbName;
  script.onerror = function() {
    clearTimeout(timer);
    delete window[cbName];
    btn.disabled = false;
    btn.textContent = 'Kirim';
    btn.style.background = '#1a73e8';
    status.className = 'status-err';
    status.innerHTML = '&#10007; Gagal memuat. Pastikan URL GAS benar dan internet aktif.';
  };
  document.head.appendChild(script);
}

document.getElementById('ft').value=new Date().toISOString().split('T')[0];
